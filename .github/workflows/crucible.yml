# Crucible self-review (the source repo reviewing its own PRs).
# Calls the reusable workflow LOCALLY, pinning the agent to the PR's own head sha so
# self-review exercises the in-progress code. Other repos onboard with the pinned-@v1
# stub instead — see docs/ONBOARD_GITHUB.md.
name: Crucible review

on:
  pull_request:                     # never pull_request_target
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    uses: ./.github/workflows/crucible-reusable.yml
    with:
      crucible_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
